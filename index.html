<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Wave - Innovation Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <main id="app">

    <!-- ========== SCREEN 1: SCANNING ========== -->
    <section class="screen screen-scanning screen--active" data-screen="scanning">
      <!-- Background topographic lines -->
      <div class="topo-bg"></div>

      <!-- Winding path with flip flop footprints -->
      <div class="scanning-path-container">
        <svg class="wave-path-svg" viewBox="0 0 300 600" preserveAspectRatio="xMidYMid meet">
          <!-- Dashed background path -->
          <path class="wave-path-bg"
                d="M150 570 C80 510, 230 460, 150 400 C70 340, 230 290, 150 230 C70 170, 230 120, 150 60"
                fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-dasharray="6 6" stroke-linecap="round"/>
          <!-- Animated draw path -->
          <path class="wave-path-draw"
                d="M150 570 C80 510, 230 460, 150 400 C70 340, 230 290, 150 230 C70 170, 230 120, 150 60"
                fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
        </svg>

        <!-- Flip flop footprints along the path -->
        <div class="footprints-container">
          <!-- Pair 1 (bottom - start) -->
          <div class="footprint footprint--warm" style="--step:0; --x:140px; --y:530px; --rotate:-10deg;"></div>
          <div class="footprint footprint--cool" style="--step:1; --x:165px; --y:505px; --rotate:15deg;"></div>
          <!-- Pair 2 -->
          <div class="footprint footprint--warm" style="--step:2; --x:110px; --y:455px; --rotate:-25deg;"></div>
          <div class="footprint footprint--cool" style="--step:3; --x:135px; --y:425px; --rotate:5deg;"></div>
          <!-- Pair 3 (middle) -->
          <div class="footprint footprint--warm" style="--step:4; --x:170px; --y:370px; --rotate:-5deg;"></div>
          <div class="footprint footprint--cool" style="--step:5; --x:195px; --y:340px; --rotate:20deg;"></div>
          <!-- Pair 4 -->
          <div class="footprint footprint--warm" style="--step:6; --x:115px; --y:280px; --rotate:-20deg;"></div>
          <div class="footprint footprint--cool" style="--step:7; --x:140px; --y:250px; --rotate:8deg;"></div>
          <!-- Pair 5 (top - end) -->
          <div class="footprint footprint--warm" style="--step:8; --x:160px; --y:190px; --rotate:-8deg;"></div>
          <div class="footprint footprint--cool" style="--step:9; --x:180px; --y:155px; --rotate:12deg;"></div>
        </div>
      </div>

      <!-- Scanning pulse -->
      <div class="scan-pulse">
        <div class="scan-pulse-dot"></div>
      </div>

      <!-- Message and CTA -->
      <div class="scanning-content">
        <div class="wave-logo">the <span>WAVE</span></div>
        <p class="scanning-message">Follow the path</p>
        <button class="btn btn-primary btn-im-here" id="btn-im-here">
          <span class="btn-icon">&#9678;</span> I'm here
        </button>
        <button class="btn btn-link btn-manual" id="btn-manual">Or choose your location</button>
      </div>
    </section>

    <!-- ========== SCREEN 2: MANUAL SELECTOR ========== -->
    <section class="screen screen-manual" data-screen="manual-select">
      <div class="topo-bg"></div>
      <div class="manual-header">
        <button class="btn btn-back" id="btn-back-scan" aria-label="Back to scanning">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <h2 class="manual-title">Select your location</h2>
      </div>
      <p class="manual-subtitle" id="manual-subtitle">Tap the step you're standing at</p>
      <div class="location-cards" id="location-cards">
        <!-- Populated by JS from config -->
      </div>
    </section>

    <!-- ========== SCREEN 3: LOCATION CONTENT ========== -->
    <section class="screen screen-location" data-screen="location">
      <div class="topo-bg"></div>

      <!-- Progress bar -->
      <div class="progress-bar">
        <div class="progress-dots" id="progress-dots">
          <!-- 5 dots populated by JS -->
        </div>
        <span class="progress-label">Step <span id="step-number">1</span> of 5</span>
      </div>

      <!-- Location content card -->
      <div class="location-card card-glass" id="location-card">
        <div class="location-header">
          <div class="location-step-badge" id="step-badge">1</div>
        </div>
        <h1 class="location-name" id="location-name"></h1>
        <p class="location-tagline" id="location-tagline"></p>
        <div class="location-divider"></div>
        <p class="location-description" id="location-description"></p>
        <ul class="location-details" id="location-details"></ul>
      </div>

      <!-- Navigation -->
      <div class="location-nav">
        <button class="btn btn-nav" id="btn-prev" aria-label="Previous step">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <button class="btn btn-secondary btn-scan-again" id="btn-scan-again">
          <span class="btn-icon">&#9678;</span> Scan again
        </button>
        <button class="btn btn-nav" id="btn-next" aria-label="Next step">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- ========== SCREEN 4: COMPLETION ========== -->
    <section class="screen screen-completion" data-screen="completion">
      <div class="topo-bg"></div>
      <div class="completion-content">
        <div class="completion-icon">&#127754;</div>
        <div class="wave-logo wave-logo--large">the <span>WAVE</span></div>
        <h1 class="completion-title">Journey Complete!</h1>
        <p class="completion-text">You've explored all 5 steps of innovation. The path of discovery never truly ends — take these ideas with you and keep innovating.</p>
        <div class="completion-steps" id="completion-steps">
          <!-- Summary of all 5 steps populated by JS -->
        </div>
        <button class="btn btn-primary btn-restart" id="btn-restart">Start Over</button>
      </div>
    </section>

  </main>

  <script src="js/config.js"></script>
  <script src="js/ble.js"></script>
  <script src="js/scanning.js"></script>
  <script src="js/locations.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
